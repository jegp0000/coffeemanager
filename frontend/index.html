<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Productos Café</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.card{background:white;padding:10px;margin:10px;border-radius:8px}
input,button{padding:8px;margin:5px}
</style>
</head>

<body>

<h2>Gestión de Productos</h2>

<h3>Agregar producto</h3>

<input id="name" placeholder="nombre">
<input id="price" placeholder="precio">
<input id="stock" placeholder="stock">
<button onclick="add()">Agregar</button>

<hr>

<h3>Lista</h3>
<div id="list"></div>

<script>

const API = "https://coffee-manager-backend-6jvc.onrender.com";

let products = [];

async function load(){
  products = await fetch(API+"/products").then(r=>r.json());
  render();
}

function render(){
  document.getElementById("list").innerHTML =
    products.map(p=>`
      <div class="card">
        <b>${p.nombre}</b><br>
        Stock: ${p.stock} | Precio: ${p.precio}

        <br>

        <button onclick="del('${p._id}')">Eliminar</button>

        <button onclick="editPrompt('${p._id}')">Editar</button>
      </div>
    `).join("");
}

// ➕ agregar
async function add(){
  await fetch(API+"/products",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:name.value,
      precio:Number(price.value),
      stock:Number(stock.value)
    })
  });

  name.value="";
  price.value="";
  stock.value="";

  load();
}

// ❌ eliminar
async function del(id){
  await fetch(API+"/products/"+id,{method:"DELETE"});
  load();
}

// ✏️ editar
async function editPrompt(id){
  const p = products.find(x=>x._id===id);

  const nombre = prompt("Nombre", p.nombre);
  const precio = prompt("Precio", p.precio);
  const stock = prompt("Stock", p.stock);

  await fetch(API+"/products/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nombre,
      precio:Number(precio),
      stock:Number(stock)
    })
  });

  load();
}

load();

</script>

</body>
</html>
