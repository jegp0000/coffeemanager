<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Coffee Manager ☕</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#2b1b14,#4b2e24);
  color: #f5e6d3;
}

header {
  text-align: center;
  padding: 20px;
  background: #3b241c;
}

header h1 {
  color: #f5c16c;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.form {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px;
  background: #a97142;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #c08a55;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #2a1a14;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #444;
}

th {
  background: #5a3e2b;
}
</style>
</head>

<body>

<header>
<h1>☕ Coffee Manager</h1>
<p>Inventario de cafetería</p>
</header>

<div class="container">

<div class="form">
  <input id="nombre" placeholder="Nombre">
  <input id="categoria" placeholder="Categoría">
  <input id="stock" type="number" placeholder="Stock">
  <input id="precio" type="number" placeholder="Precio">
  <button onclick="crear()">Agregar</button>
</div>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Categoría</th>
<th>Stock</th>
<th>Precio</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

const API = "http://localhost:3000/productos";

// CARGAR
async function cargar() {
  const res = await fetch(API);
  const data = await res.json();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(p => {
    tabla.innerHTML += `
      <tr>
        <td>${p.nombre}</td>
        <td>${p.categoria}</td>
        <td>${p.stock}</td>
        <td>${p.precio}</td>
        <td><button onclick="eliminar('${p._id}')">Eliminar</button></td>
      </tr>
    `;
  });
}

// CREAR
async function crear() {
  const producto = {
    nombre: nombre.value,
    categoria: categoria.value,
    stock: stock.value,
    precio: precio.value
  };

  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(producto)
  });

  cargar();
}

// ELIMINAR
async function eliminar(id) {
  await fetch(`${API}/${id}`, { method: "DELETE" });
  cargar();
}

cargar();

</script>

</body>
</html>
